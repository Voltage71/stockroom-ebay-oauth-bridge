<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Stockroom eBay OAuth Bridge</title>
        <style>
            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: #111827;
                color: #e5e7eb;
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            }

            main {
                width: min(640px, calc(100vw - 2rem));
                padding: 2rem;
                border-radius: 1.5rem;
                background: rgba(17, 24, 39, 0.96);
                border: 1px solid rgba(148, 163, 184, 0.2);
                box-shadow: 0 24px 80px rgba(15, 23, 42, 0.45);
            }

            h1 {
                margin-top: 0;
                font-size: 1.5rem;
            }

            p, li {
                line-height: 1.6;
                color: #cbd5e1;
            }

            code, a {
                color: #a5f3fc;
                word-break: break-word;
            }

            a.button {
                display: inline-block;
                margin-top: 1rem;
                padding: 0.8rem 1.1rem;
                border-radius: 9999px;
                background: #06b6d4;
                color: #082f49;
                font-weight: 700;
                text-decoration: none;
            }

            .muted {
                color: #94a3b8;
                font-size: 0.95rem;
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Redirecting back to Stockroom</h1>
            <p id="message">Preparing the local callback.</p>
            <p class="muted" id="details"></p>
            <a class="button" id="continue-link" href="#" hidden>Continue to Stockroom</a>
        </main>

        <script>
            const message = document.getElementById("message");
            const details = document.getElementById("details");
            const continueLink = document.getElementById("continue-link");

            function decodeState(rawState) {
                if (!rawState || !rawState.startsWith("stockroom.")) {
                    return null;
                }

                const encoded = rawState.slice("stockroom.".length);
                const normalized = encoded.replace(/-/g, "+").replace(/_/g, "/");
                const padding = normalized.length % 4 === 0 ? "" : "=".repeat(4 - (normalized.length % 4));

                try {
                    return JSON.parse(atob(normalized + padding));
                } catch (_error) {
                    return null;
                }
            }

            const params = new URLSearchParams(window.location.search);
            const state = decodeState(params.get("state"));
            const localCallbackUrl = state && typeof state.local_callback_url === "string"
                ? state.local_callback_url
                : null;

            if (!localCallbackUrl) {
                message.textContent = "This bridge could not find the local callback URL.";
                details.textContent = "Reconnect from Stockroom and keep the same browser window open.";
            } else {
                const redirectUrl = new URL(localCallbackUrl);

                for (const [key, value] of params.entries()) {
                    redirectUrl.searchParams.set(key, value);
                }

                continueLink.href = redirectUrl.toString();
                continueLink.hidden = false;
                details.textContent = redirectUrl.toString();
                window.location.replace(redirectUrl.toString());
            }
        </script>
    </body>
</html>
